---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyrt-api
  labels:
    app: cyrt-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cyrt-api
  template:
    metadata:
      labels:
        app: cyrt-api
    spec:
      containers:
        - name: cyrt-api
          image: 488850522194.dkr.ecr.us-east-1.amazonaws.com/cyrt-safe-to-land:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
# Backend Service (internal, only reachable inside the cluster)
apiVersion: v1
kind: Service
metadata:
  name: cyrt-api
spec:
  type: ClusterIP
  selector:
    app: cyrt-api
  ports:
    - port: 80
      targetPort: 8080

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyrt-frontend
  labels:
    app: cyrt-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cyrt-frontend
  template:
    metadata:
      labels:
        app: cyrt-frontend
    spec:
      containers:
        - name: cyrt-frontend
          image: 488850522194.dkr.ecr.us-east-1.amazonaws.com/cyrt-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5

---
# Frontend Service (internal, only reachable inside the cluster)
apiVersion: v1
kind: Service
metadata:
  name: cyrt-frontend
spec:
  type: ClusterIP
  selector:
    app: cyrt-frontend
  ports:
    - port: 80
      targetPort: 80

---
# ALB Ingress — the single public entrypoint for everything
# Routes /          → frontend
# Routes /predict   → backend
# Routes /health    → backend
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cyrt-ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    # Uncomment for HTTPS (requires cert ARN):
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:...
    # alb.ingress.kubernetes.io/ssl-redirect: "443"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /predict
            pathType: Prefix
            backend:
              service:
                name: cyrt-api
                port:
                  number: 80
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: cyrt-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cyrt-frontend
                port:
                  number: 80
